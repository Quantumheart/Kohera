name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FLUTTER_CHANNEL: stable

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - name: Enforce NSE has no CallKit/PushKit imports
        run: |
          if grep -rE '^import (CallKit|PushKit)' ios/KoheraNotificationService/; then
            echo "::error::Notification Service Extension must not import CallKit or PushKit"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  build-linux:
    if: github.event_name == 'push'
    needs: [analyze, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libmpv-dev
      - run: flutter pub get
      - run: flutter build linux --release --dart-define=GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}

  build-macos:
    if: github.event_name == 'push'
    needs: [analyze, test]
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Pre-build macOS Pods (force repo update)
        working-directory: macos
        run: |
          flutter precache --macos
          pod install --repo-update
      - run: flutter build macos --release --dart-define=GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}

  build-ios:
    if: github.event_name == 'push'
    needs: [analyze, test]
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Pre-build iOS Pods (force repo update)
        working-directory: ios
        run: |
          flutter precache --ios
          pod install --repo-update
      - run: flutter build ios --release --no-codesign --dart-define=GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}

  build-android:
    if: github.event_name == 'push'
    needs: [analyze, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --dart-define=GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}
